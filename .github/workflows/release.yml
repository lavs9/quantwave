name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-rust:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish quantwave-core
        run: cargo publish -p quantwave-core --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true
        
      - name: Wait for quantwave-core to be available
        run: sleep 45
        
      - name: Publish quantwave-polars
        run: cargo publish -p quantwave-polars --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true

      - name: Publish quantwave-plugins
        run: cargo publish -p quantwave-plugins --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true

      - name: Wait for dependencies to be available
        run: sleep 45

      - name: Publish quantwave
        run: cargo publish -p quantwave --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true

  build-python-wheels:
    name: Build Python Wheels (${{ matrix.platform }})
    needs: [publish-rust]
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin and uniffi-bindgen
        run: pip install maturin uniffi-bindgen==0.31.0

      - name: Build wheels
        run: |
          cd quantwave-python
          maturin build --release --out ../dist
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl

  build-python-sdist:
    name: Build Python Source Distribution
    needs: [publish-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin and uniffi-bindgen
        run: pip install maturin uniffi-bindgen==0.31.0
      - name: Build sdist
        run: |
          cd quantwave-python
          maturin sdist --out ../dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  publish-python:
    name: Publish Python to PyPI
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Publish to PyPI
        run: |
          ls -R dist
          maturin publish --skip-existing --manifest-path quantwave-python/Cargo.toml dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
