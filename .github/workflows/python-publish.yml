name: Python Package (PyPI)

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build wheels + publish to PyPI
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path quantwave-python/Cargo.toml
          sccache: 'true'
          manylinux: auto

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: publish
          args: --skip-existing --manifest-path quantwave-python/Cargo.toml dist/*
