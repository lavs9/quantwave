[workspace]
members = [
    "quantwave",
    "quantwave-core",
    "quantwave-polars",
    "quantwave-plugins", "quantwave-xtask",
]
resolver = "2"

[workspace.package]
version = "0.1.5"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mayanklavania/quantwave"
homepage = "https://github.com/mayanklavania/quantwave"
authors = ["Mayank Lavania"]
description = "A high-performance, Polars-native technical analysis library for Rust."
readme = "README.md"
categories = ["science", "mathematics"]
keywords = ["trading", "technical-analysis", "polars", "finance"]

[workspace.dependencies]
polars = { version = "0.46", features = ["lazy", "dtype-struct", "streaming"] }
polars-core = { version = "0.46" }
talib-rs = "0.1"
proptest = "1.0"
approx = "0.5"
serde = { version = "1.0", features = ["derive"] }
rustfft = "6"
rand = "0.8"
serde_json = "1.0"
log = "0.4"
thiserror = "1.0"

[profile.dev]
opt-level = 0
debug = 1 # Use line tables only to speed up linking
codegen-units = 256 # More units = faster compilation, slightly slower code
incremental = true

[profile.test]
opt-level = 0
debug = 1 # Use line tables only to speed up linking
codegen-units = 256
incremental = true
